# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Phoenix Test Automation Workflow

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule: #set a cron for midnight
    - cron: "30 18 * * *"
    - cron: "30 17 * * *"
    - cron: "30 19 * * *"

  workflow_dispatch:
    inputs:
       env:
         description: "Environment"
         type: choice
         options: [qa,uat,dev]
         default: qa
         required: true
       suiteXmlFile:
         description: "TestNG Xml File"
         type: choice
         options: [testng.xml,smoke.xml,regression.xml]
         default: testng.xml
         required: true
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Default values for Execution
      id: default
      run: |
             echo "suiteXmlFile = ${{ github.event.inputs.suiteXmlFile || 'testng.xml'}}" >> $GITHUB_OUTPUT
             echo "env = ${{ github.event.inputs.env || 'qa' }}" >> $GITHUB
             
    - name: Execute Test Automation Framework
      run: mvn clean test -DsuiteXmlFile="${{ steps.default.outputs.suiteXmlFile }}" -Denv="${{ steps.default.outputs.env }}"

    - name: Upload a Build Artifact
      if: always()
      uses: actions/upload-artifact@v7.0.0
      with:
        name: SureFire Report
        path: target/surefire-reports/
        retention-days: 10

